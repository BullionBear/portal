name: CI/CD

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/portal

jobs:
  build:
    name: Build & push ${{ matrix.service }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - service: backend
            context: ./backend
          - service: frontend
            context: ./frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase image name
        id: img
        run: echo "name=${IMAGE_PREFIX@L}-${{ matrix.service }}" >> "$GITHUB_OUTPUT"

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          tags: |
            ${{ steps.img.outputs.name }}:latest
            ${{ steps.img.outputs.name }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  deploy:
    name: Deploy to server
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.SERVER_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Sync compose file
        run: |
          ssh -i ~/.ssh/id_ed25519 "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}" \
            'mkdir -p /opt/portal/deploy'
          scp -i ~/.ssh/id_ed25519 deploy/docker-compose.yml \
            "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/opt/portal/deploy/docker-compose.yml"

      - name: Pull & restart
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Private GHCR packages require auth; log in on the host with this
          # job's token, then pull/restart the stack.
          printf '%s' "$GHCR_TOKEN" | ssh -i ~/.ssh/id_ed25519 \
            "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}" \
            "docker login ghcr.io -u '${{ github.actor }}' --password-stdin \
             && cd /opt/portal/deploy \
             && docker compose -p portal pull \
             && docker compose -p portal up -d \
             && docker image prune -f"

  notify:
    name: Notify Discord
    needs: [build, deploy]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Resolve commit message
        id: meta
        run: |
          MSG=$(git log -1 --pretty=%B | tr -d '\r' | head -c 1000)
          echo "message<<EOF" >> "$GITHUB_OUTPUT"
          echo "$MSG" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Send Discord notification (Success)
        if: ${{ needs.build.result == 'success' && needs.deploy.result == 'success' }}
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
          REPO: ${{ github.repository }}
          BRANCH: ${{ github.ref_name }}
          COMMIT_SHA: ${{ github.sha }}
          COMMIT_MESSAGE: ${{ steps.meta.outputs.message }}
          ACTOR: ${{ github.actor }}
          SERVER_URL: ${{ github.server_url }}
        run: |
          if [ -z "$DISCORD_WEBHOOK" ]; then
            echo "DISCORD_WEBHOOK_URL secret is not set; skipping notify"
            exit 0
          fi
          SHORT_SHA="${COMMIT_SHA::7}"
          jq -n \
            --arg repo "$REPO" \
            --arg branch "$BRANCH" \
            --arg commit "[${SHORT_SHA}](${SERVER_URL}/${REPO}/commit/${COMMIT_SHA})" \
            --arg message "${COMMIT_MESSAGE:-"(no message)"}" \
            --arg actor "$ACTOR" \
            --arg ts "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            '{embeds: [{
              title: "✅ Deployment Successful",
              description: "Portal has been deployed to production.",
              color: 3066993,
              fields: [
                {name: "Repository", value: $repo, inline: true},
                {name: "Branch", value: $branch, inline: true},
                {name: "Commit", value: $commit, inline: false},
                {name: "Message", value: $message, inline: false},
                {name: "Triggered by", value: $actor, inline: true}
              ],
              timestamp: $ts
            }]}' \
          | curl -sf -H "Content-Type: application/json" -X POST -d @- "$DISCORD_WEBHOOK"

      - name: Send Discord notification (Failure)
        if: ${{ needs.build.result == 'failure' || needs.deploy.result == 'failure' }}
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
          REPO: ${{ github.repository }}
          BRANCH: ${{ github.ref_name }}
          COMMIT_SHA: ${{ github.sha }}
          COMMIT_MESSAGE: ${{ steps.meta.outputs.message }}
          SERVER_URL: ${{ github.server_url }}
          RUN_ID: ${{ github.run_id }}
          BUILD_RESULT: ${{ needs.build.result }}
          DEPLOY_RESULT: ${{ needs.deploy.result }}
        run: |
          if [ -z "$DISCORD_WEBHOOK" ]; then
            echo "DISCORD_WEBHOOK_URL secret is not set; skipping notify"
            exit 0
          fi
          SHORT_SHA="${COMMIT_SHA::7}"
          if [ "$BUILD_RESULT" != "success" ]; then
            TITLE="🔴 Docker Build Failed"
            DESCRIPTION="Docker image build has failed. Deployment skipped."
          else
            TITLE="❌ Deployment Failed"
            DESCRIPTION="Portal deployment to production has failed."
          fi
          jq -n \
            --arg title "$TITLE" \
            --arg description "$DESCRIPTION" \
            --arg repo "$REPO" \
            --arg branch "$BRANCH" \
            --arg commit "[${SHORT_SHA}](${SERVER_URL}/${REPO}/commit/${COMMIT_SHA})" \
            --arg message "${COMMIT_MESSAGE:-"(no message)"}" \
            --arg run "[View Logs](${SERVER_URL}/${REPO}/actions/runs/${RUN_ID})" \
            --arg ts "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            '{embeds: [{
              title: $title,
              description: $description,
              color: 15158332,
              fields: [
                {name: "Repository", value: $repo, inline: true},
                {name: "Branch", value: $branch, inline: true},
                {name: "Commit", value: $commit, inline: false},
                {name: "Message", value: $message, inline: false},
                {name: "Workflow Run", value: $run, inline: true}
              ],
              timestamp: $ts
            }]}' \
          | curl -sf -H "Content-Type: application/json" -X POST -d @- "$DISCORD_WEBHOOK"

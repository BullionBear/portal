name: CI/CD

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/portal

jobs:
  build:
    name: Build & push ${{ matrix.service }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - service: backend
            context: ./backend
          - service: frontend
            context: ./frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase image name
        id: img
        run: echo "name=${IMAGE_PREFIX@L}-${{ matrix.service }}" >> "$GITHUB_OUTPUT"

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          tags: |
            ${{ steps.img.outputs.name }}:latest
            ${{ steps.img.outputs.name }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  deploy:
    name: Deploy to server
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.SERVER_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Sync compose file
        run: |
          ssh -i ~/.ssh/id_ed25519 "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}" \
            'mkdir -p /opt/portal/deploy'
          scp -i ~/.ssh/id_ed25519 deploy/docker-compose.yml \
            "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/opt/portal/deploy/docker-compose.yml"

      - name: Pull & restart
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Private GHCR packages require auth; log in on the host with this
          # job's token, then pull/restart the stack.
          printf '%s' "$GHCR_TOKEN" | ssh -i ~/.ssh/id_ed25519 \
            "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}" \
            "docker login ghcr.io -u '${{ github.actor }}' --password-stdin \
             && cd /opt/portal/deploy \
             && docker compose -p portal pull \
             && docker compose -p portal up -d \
             && docker image prune -f"

  notify:
    name: Notify Discord
    needs: [build, deploy]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Send Discord webhook
        env:
          WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          BUILD_RESULT: ${{ needs.build.result }}
          DEPLOY_RESULT: ${{ needs.deploy.result }}
          COMMIT_SHA: ${{ github.sha }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ -z "$WEBHOOK_URL" ]; then
            echo "DISCORD_WEBHOOK_URL secret is not set; skipping notify"
            exit 0
          fi

          SHORT_SHA="${COMMIT_SHA::7}"
          COMMIT_MSG=$(git log -1 --pretty=%B | tr -d '\r')

          if [ "$DEPLOY_RESULT" = "success" ]; then
            STATUS="Deploy succeeded"
            COLOR=5763719
          elif [ "$BUILD_RESULT" != "success" ]; then
            STATUS="Build failed"
            COLOR=15548997
          elif [ "$DEPLOY_RESULT" = "skipped" ]; then
            STATUS="Deploy skipped"
            COLOR=16776960
          else
            STATUS="Deploy failed"
            COLOR=15548997
          fi

          payload=$(jq -n \
            --arg status "$STATUS" \
            --arg sha "$SHORT_SHA" \
            --arg full_sha "$COMMIT_SHA" \
            --arg msg "$COMMIT_MSG" \
            --arg url "$RUN_URL" \
            --argjson color "$COLOR" \
            '{
              embeds: [{
                title: ("Portal CI/CD — " + $status),
                color: $color,
                fields: [
                  { name: "Commit", value: ("`" + $sha + "`"), inline: true },
                  { name: "Full SHA", value: ("`" + $full_sha + "`"), inline: false },
                  { name: "Message", value: ($msg[0:1000] | if . == "" then "(no message)" else . end), inline: false },
                  { name: "Run", value: $url, inline: false }
                ]
              }]
            }')

          curl -sS -f -X POST \
            -H 'Content-Type: application/json' \
            -d "$payload" \
            "$WEBHOOK_URL"

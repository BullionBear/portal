# Lynkora Portal — deployed on portal.lynkora.com
#
# This stack ships ONLY the portal's own containers. TLS termination, the
# ACME/Let's Encrypt certificate and ports 80/443 are owned by the shared
# standalone Traefik on this host (compose project `traefik`, /opt/traefik).
# We attach to its external `web` network so Traefik can discover and route to
# us via the traefik.* labels below.
#
# Routing (single host, path-based):
#   portal.lynkora.com/api/public/*   -> backend:8000   (open)
#   portal.lynkora.com/api/private/*  -> backend:8000   (Discord OAuth)
#   portal.lynkora.com/admin          -> frontend:80    (Discord OAuth)
#   portal.lynkora.com/oauth2/*       -> oauth2-proxy   (login/callback)
#   portal.lynkora.com/*              -> frontend:80    (open SPA)
#
# Secrets live in /opt/portal/deploy/.env (see .env.example). CI only syncs
# this compose file; .env is not overwritten by deploys.

services:
  oauth2-proxy:
    image: quay.io/oauth2-proxy/oauth2-proxy:v7.9.0
    restart: unless-stopped
    environment:
      OAUTH2_PROXY_PROVIDER: discord
      OAUTH2_PROXY_CLIENT_ID: ${DISCORD_CLIENT_ID}
      OAUTH2_PROXY_CLIENT_SECRET: ${DISCORD_CLIENT_SECRET}
      OAUTH2_PROXY_COOKIE_SECRET: ${OAUTH2_PROXY_COOKIE_SECRET}
      OAUTH2_PROXY_COOKIE_SECURE: "true"
      OAUTH2_PROXY_COOKIE_HTTPONLY: "true"
      OAUTH2_PROXY_COOKIE_SAMESITE: lax
      OAUTH2_PROXY_EMAIL_DOMAINS: "*"
      OAUTH2_PROXY_HTTP_ADDRESS: 0.0.0.0:4180
      OAUTH2_PROXY_REVERSE_PROXY: "true"
      OAUTH2_PROXY_UPSTREAMS: static://202
      OAUTH2_PROXY_REDIRECT_URL: https://portal.lynkora.com/oauth2/callback
      OAUTH2_PROXY_WHITELIST_DOMAINS: portal.lynkora.com
      OAUTH2_PROXY_SET_XAUTHREQUEST: "true"
      OAUTH2_PROXY_SCOPE: identify email guilds
      OAUTH2_PROXY_SKIP_PROVIDER_BUTTON: "true"
      OAUTH2_PROXY_FOOTER: "-"
      # Restrict to this Discord guild (guild id is exposed as a "group")
      OAUTH2_PROXY_ALLOWED_GROUPS: ${DISCORD_GUILD_ID}
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=web"
      # Login / callback / sign_out
      - "traefik.http.routers.portal-oauth.rule=Host(`portal.lynkora.com`) && PathPrefix(`/oauth2`)"
      - "traefik.http.routers.portal-oauth.entrypoints=websecure"
      - "traefik.http.routers.portal-oauth.tls.certresolver=le"
      - "traefik.http.routers.portal-oauth.priority=300"
      - "traefik.http.services.portal-oauth.loadbalancer.server.port=4180"
      # ForwardAuth used by private API + /admin
      - "traefik.http.middlewares.portal-discord-auth.forwardauth.address=http://oauth2-proxy:4180/oauth2/auth"
      - "traefik.http.middlewares.portal-discord-auth.forwardauth.trustForwardHeader=true"
      - "traefik.http.middlewares.portal-discord-auth.forwardauth.authResponseHeaders=X-Auth-Request-User,X-Auth-Request-Email,X-Auth-Request-Groups"
      # Browser 401 → Discord sign-in (preserves original URL)
      - "traefik.http.middlewares.portal-discord-errors.errors.status=401-403"
      - "traefik.http.middlewares.portal-discord-errors.errors.service=portal-oauth@docker"
      - "traefik.http.middlewares.portal-discord-errors.errors.query=/oauth2/sign_in?rd={url}"
    networks:
      - web

  backend:
    image: ghcr.io/bullionbear/portal-backend:latest
    restart: unless-stopped
    volumes:
      # Persist the apps catalog across image updates
      - portal-data:/app/app/data
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=web"
      # Public API — no auth
      - "traefik.http.routers.portal-api-public.rule=Host(`portal.lynkora.com`) && PathPrefix(`/api/public`)"
      - "traefik.http.routers.portal-api-public.entrypoints=websecure"
      - "traefik.http.routers.portal-api-public.tls.certresolver=le"
      - "traefik.http.routers.portal-api-public.priority=200"
      - "traefik.http.routers.portal-api-public.service=portal-backend"
      # Private API — Discord OAuth via oauth2-proxy
      - "traefik.http.routers.portal-api-private.rule=Host(`portal.lynkora.com`) && PathPrefix(`/api/private`)"
      - "traefik.http.routers.portal-api-private.entrypoints=websecure"
      - "traefik.http.routers.portal-api-private.tls.certresolver=le"
      - "traefik.http.routers.portal-api-private.priority=200"
      - "traefik.http.routers.portal-api-private.middlewares=portal-discord-errors@docker,portal-discord-auth@docker"
      - "traefik.http.routers.portal-api-private.service=portal-backend"
      - "traefik.http.services.portal-backend.loadbalancer.server.port=8000"
    networks:
      - web

  frontend:
    image: ghcr.io/bullionbear/portal-frontend:latest
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=web"
      # Admin UI — Discord OAuth (browser redirect on first visit)
      - "traefik.http.routers.portal-admin.rule=Host(`portal.lynkora.com`) && PathPrefix(`/admin`)"
      - "traefik.http.routers.portal-admin.entrypoints=websecure"
      - "traefik.http.routers.portal-admin.tls.certresolver=le"
      - "traefik.http.routers.portal-admin.priority=50"
      - "traefik.http.routers.portal-admin.middlewares=portal-discord-errors@docker,portal-discord-auth@docker"
      - "traefik.http.routers.portal-admin.service=portal-frontend"
      # Public SPA
      - "traefik.http.routers.portal-frontend.rule=Host(`portal.lynkora.com`)"
      - "traefik.http.routers.portal-frontend.entrypoints=websecure"
      - "traefik.http.routers.portal-frontend.tls.certresolver=le"
      - "traefik.http.routers.portal-frontend.priority=1"
      - "traefik.http.services.portal-frontend.loadbalancer.server.port=80"
    networks:
      - web

volumes:
  portal-data:

networks:
  web:
    name: web
    external: true
